name: Repository 2 - Unified Docker Cycle (05:30 PM IST)
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: daily-docker-2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x script.sh

      - name: Determine Execution Mode
        id: mode
        env:
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          if [ -n "$MATRIX_DB_HOST" ] && [ "$MATRIX_DB_HOST" != "null" ]; then
             echo "EXECUTION_MODE=DYNAMIC" >> $GITHUB_ENV
             echo "Execution Mode: DYNAMIC (Matrix DB Bootstrapper)"
          else
             echo "EXECUTION_MODE=LEGACY" >> $GITHUB_ENV
             echo "Execution Mode: LEGACY (Manual GitHub Secrets)"
          fi

      - name: Matrix DB Bootstrapper (Dynamic Mode)
        id: bootstrapper
        if: env.EXECUTION_MODE == 'DYNAMIC'
        env:
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "Contacting Matrix DB for Pod Environment..."
          curl -s -H "Authorization: Bearer $ORCHESTRATOR_TOKEN" "$MATRIX_DB_HOST/api/farm/runner-env?group=$GROUP_ID" > runner_env.json

          # Inject all variables directly into the runner memory!
          echo "ACCOUNT_1=$(jq -r .account_1 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_2=$(jq -r .account_2 runner_env.json)" >> $GITHUB_ENV
          echo "ACCOUNT_3=$(jq -r .account_3 runner_env.json)" >> $GITHUB_ENV

          echo "SESSION_RESTORE_URL_ONE=$(jq -r .restore_url_1 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_TWO=$(jq -r .restore_url_2 runner_env.json)" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_THREE=$(jq -r .restore_url_3 runner_env.json)" >> $GITHUB_ENV

          echo "DISCORD_WEBHOOK_URL=$(jq -r .discord_webhook_url runner_env.json)" >> $GITHUB_ENV

          echo "Successfully injected secrets from Matrix DB!"

      - name: Legacy Secret Injector (Legacy Mode)
        id: legacy
        if: env.EXECUTION_MODE == 'LEGACY'
        env:
          ACCOUNT_1: ${{ secrets.ACCOUNT_1 }}
          ACCOUNT_2: ${{ secrets.ACCOUNT_2 }}
          ACCOUNT_3: ${{ secrets.ACCOUNT_3 }}
          SESSION_RESTORE_URL_ONE: ${{ secrets.SESSION_RESTORE_URL_ONE }}
          SESSION_RESTORE_URL_TWO: ${{ secrets.SESSION_RESTORE_URL_TWO }}
          SESSION_RESTORE_URL_THREE: ${{ secrets.SESSION_RESTORE_URL_THREE }}
          SCRIPT_URL_ONE: ${{ secrets.SCRIPT_URL_ONE }}
          SCRIPT_URL_TWO: ${{ secrets.SCRIPT_URL_TWO }}
          SCRIPT_URL_THREE: ${{ secrets.SCRIPT_URL_THREE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          echo "Injecting standard GitHub Secrets into Environment..."
          echo "ACCOUNT_1=$ACCOUNT_1" >> $GITHUB_ENV
          echo "ACCOUNT_2=$ACCOUNT_2" >> $GITHUB_ENV
          echo "ACCOUNT_3=$ACCOUNT_3" >> $GITHUB_ENV

          echo "SESSION_RESTORE_URL_ONE=$SESSION_RESTORE_URL_ONE" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_TWO=$SESSION_RESTORE_URL_TWO" >> $GITHUB_ENV
          echo "SESSION_RESTORE_URL_THREE=$SESSION_RESTORE_URL_THREE" >> $GITHUB_ENV

          echo "SCRIPT_URL_ONE=$SCRIPT_URL_ONE" >> $GITHUB_ENV
          echo "SCRIPT_URL_TWO=$SCRIPT_URL_TWO" >> $GITHUB_ENV
          echo "SCRIPT_URL_THREE=$SCRIPT_URL_THREE" >> $GITHUB_ENV

          echo "DISCORD_WEBHOOK_URL=$DISCORD_WEBHOOK_URL" >> $GITHUB_ENV

      - name: Calculate Daily Active Pod
        id: calculate
        env:
          GROUP_ID: ${{ secrets.GROUP_ID }}
          MATRIX_DB_HOST: ${{ secrets.MATRIX_DB_HOST }}
        run: |
          echo "JOB_START=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "IP=$(curl -s https://api.ipify.org)" >> $GITHUB_ENV

          # Dynamic rotation logic exactly like legacy
          DAY_NUM=$(date +%j | sed 's/^0*//')
          INDEX=$(( (DAY_NUM - 1) % 3 ))

          if [ "$INDEX" -eq 0 ]; then
             echo "Using two.sh -> Account 2"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_2" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 2" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=two" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_TWO" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_TWO" >> $GITHUB_ENV
          elif [ "$INDEX" -eq 1 ]; then
             echo "Using three.sh -> Account 3"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_3" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 3" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=three" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_THREE" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_THREE" >> $GITHUB_ENV
          else
             echo "Using one.sh -> Account 1"
             echo "ACTIVE_ACCOUNT=$ACCOUNT_1" >> $GITHUB_ENV
             echo "ACCOUNT_NAME=Account 1" >> $GITHUB_ENV
             if [ "$EXECUTION_MODE" == "DYNAMIC" ]; then
                echo "TARGET_SCRIPT_URL=$MATRIX_DB_HOST/api/farm/payload?group=$GROUP_ID&sequence=one" >> $GITHUB_ENV
             else
                echo "TARGET_SCRIPT_URL=$SCRIPT_URL_ONE" >> $GITHUB_ENV
             fi
             echo "TARGET_RESTORE_URL=$SESSION_RESTORE_URL_ONE" >> $GITHUB_ENV
          fi

      - name: Send IP to collector (Ingest)
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Skipping."
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          sig=$(printf "%s" "$payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          curl -s -X POST "$COLLECTOR_URL/ingest" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $sig" \
            -d "$payload" || true

      - name: Ask collector if we should run (Gate)
        id: gate
        continue-on-error: true
        env:
          COLLECTOR_URL: ${{ secrets.COLLECTOR_URL }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
        run: |
          if [ -z "$COLLECTOR_URL" ] || [ "$COLLECTOR_URL" == "null" ] || [ "$COLLECTOR_URL" == "" ]; then
             echo "No Collector URL provided. Defaulting to SHOULD_RUN=true."
             echo "SHOULD_RUN=true" >> $GITHUB_ENV
             exit 0
          fi

          ACC="${ACTIVE_ACCOUNT:-${{ github.repository_owner }}}"
          ACC_LABEL="${ACCOUNT_NAME:-${{ github.repository_owner }}}"

          gate_payload=$(jq -n \
            --arg account  "$ACC" \
            --arg label    "$ACC_LABEL" \
            --arg repo     "${{ github.repository }}" \
            --arg run_id   "${{ github.run_id }}" \
            --arg job      "${{ github.job }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ip       "${IP:-unknown}" \
            --arg ts       "${JOB_START}" \
            '{account:$account,account_label:$label,repo:$repo,run_id:$run_id,job:$job,workflow:$workflow,ip:$ip,ts:$ts}')

          gate_sig=$(printf "%s" "$gate_payload" | openssl dgst -sha256 -hmac "$HMAC_SECRET" -binary | base64)

          resp=$(curl -s -X POST "$COLLECTOR_URL/gate" \
            -H "Authorization: Bearer $COLLECTOR_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Signature: $gate_sig" \
            -d "$gate_payload" || echo '{}')

          should_run=$(echo "$resp" | jq -r '.should_run // "true"')
          reason=$(echo "$resp" | jq -r '.reason // ""')

          echo "SHOULD_RUN=$should_run" >> $GITHUB_ENV
          echo "GATE_REASON=$reason" >> $GITHUB_ENV

      - name: Abort early (Policy Check)
        if: env.SHOULD_RUN != 'true'
        run: |
          echo "Policy triggered: ${{ env.GATE_REASON }}. Skipping project run." >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: Run Unified Dispatcher script
        if: env.SHOULD_RUN == 'true'
        env:
          ORCHESTRATOR_TOKEN: ${{ secrets.ORCHESTRATOR_TOKEN }}
          PROJECT_NAME: '007-of-two'
          SESSION_COPY_DELAY: 3400 # Wait 95 minutes before copying sessions
          ENABLE_SESSION_UPLOAD: 'true' # Set to 'false' to disable artifact upload
          ENABLE_ARTIFACT_UPLOAD: 'true' # Upload as Build Artifact
          ENABLE_RELEASE_UPLOAD: 'false' # Upload to GitHub Release
          ENABLE_SESSION_RESTORE: 'false' # Set to 'true' to enable session restore (and disable upload)
        run: ./script.sh

      - name: Upload Sessions Artifact
        if: env.SHOULD_RUN == 'true' && env.ENABLE_ARTIFACT_UPLOAD == 'true' && env.ARTIFACT_CREATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: sessions.zip
          retention-days: 5

      - name: Keep Repository Active (Prevent 60-Day Disable)
        if: always()
        env:
          # Configuration for Keepalive commit
          # 'always'   = Commit every single time the action runs (Great for testing!)
          # 'weekly'   = Commit once every 7 days
          # '25_days'  = Commit once every 25 days (Very safe buffer)
          # 'monthly'  = Commit once every 30 days
          # 'default'  = Commit once every 50 days (Cleanest history)
          KEEPALIVE_MODE: 'always'
        run: |
          echo "Checking keepalive policy..."

          # Calculate days since last commit
          LAST_COMMIT_TS=$(git log -1 --format="%ct" || echo "0")
          CURRENT_TS=$(date +%s)
          DAYS_SINCE_COMMIT=$(( (CURRENT_TS - LAST_COMMIT_TS) / 86400 ))
          echo "Days since last commit: $DAYS_SINCE_COMMIT"

          SHOULD_COMMIT=false
          if [ "$KEEPALIVE_MODE" = "always" ]; then
            SHOULD_COMMIT=true
          elif [ "$KEEPALIVE_MODE" = "weekly" ] && [ "$DAYS_SINCE_COMMIT" -ge 7 ]; then
            SHOULD_COMMIT=true
          elif [ "$KEEPALIVE_MODE" = "25_days" ] && [ "$DAYS_SINCE_COMMIT" -ge 25 ]; then
            SHOULD_COMMIT=true
          elif [ "$KEEPALIVE_MODE" = "monthly" ] && [ "$DAYS_SINCE_COMMIT" -ge 30 ]; then
            SHOULD_COMMIT=true
          elif [ "$KEEPALIVE_MODE" = "default" ] && [ "$DAYS_SINCE_COMMIT" -ge 50 ]; then
            SHOULD_COMMIT=true
          fi

          if [ "$SHOULD_COMMIT" = "true" ]; then
            echo "Keepalive condition met. Creating automated commit..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            # Create or update an invisible keepalive file
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github_keepalive

            git add .github_keepalive
            # Check if there are changes to commit (prevents failing if somehow nothing changed)
            if git diff --staged --quiet; then
               echo "No changes to commit."
            else
               git commit -m "chore: automated keepalive commit to prevent workflow deactivation"
               git push
               echo "Keepalive commit pushed successfully."
            fi
          else
            echo "Keepalive condition not met (Mode: $KEEPALIVE_MODE). Skipping commit."
          fi
